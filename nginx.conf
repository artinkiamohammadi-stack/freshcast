# nginx.conf — Nginx reverse proxy configuration
#
# Nginx does two things here:
#   1. Serves the static frontend files (HTML/CSS/JS) at http://localhost/
#   2. Proxies any request to /api/* → the FastAPI container at http://api:8000
#      (Docker's internal DNS resolves the service name "api")
#
# This lets the browser talk to a single origin (port 80) instead of
# having to deal with CORS between port 80 (frontend) and port 8000 (API).

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Compress text responses — saves ~70% bandwidth for JSON/HTML
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name localhost;

        # ── Static frontend ───────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── API proxy ─────────────────────────────────────────────
        # Strip the /api prefix before forwarding to FastAPI
        # e.g. GET /api/products → GET /products on the api container
        location /api/ {
            proxy_pass         http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for the /retrain endpoint (training takes ~30s)
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
